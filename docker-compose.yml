services:

  postgres:
    image: postgres:16-alpine
    container_name: enneagram_postgres
    restart: unless-stopped
    # Ajuste max_connections ≥ (número_de_réplicas × PG_POOL_MAX × pools_por_app). Ver .env.example.
    command: ['postgres', '-c', 'max_connections=200']
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init.sql está vazio; schema: aplique scripts/rds-bootstrap-completo.sql ou migrações no Postgres alvo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enneagram_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy   # aguarda o banco estar pronto antes de subir
    env_file: .env
    environment:
      POSTGRES_HOST: postgres        # nome do service acima — Docker resolve automaticamente
    ports:
      - "3000:3000"

volumes:
  postgres_data:
