version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: enneagram_postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enneagram_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy   # aguarda o banco estar pronto antes de subir
    env_file: .env
    environment:
      POSTGRES_HOST: postgres        # nome do service acima — Docker resolve automaticamente
    ports:
      - "3000:3000"

volumes:
  postgres_data:
