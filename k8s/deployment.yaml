apiVersion: apps/v1
kind: Deployment
metadata:
  name: enneagram-app
  namespace: enneagram
  labels:
    app: enneagram-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enneagram-app
  template:
    metadata:
      labels:
        app: enneagram-app
    spec:
      containers:
        - name: enneagram-app
          image: ghcr.io/3035tech/enneagram-app:latest  # ajuste para sua registry
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          # Variáveis não sensíveis (ConfigMap)
          envFrom:
            - configMapRef:
                name: enneagram-config

          # Variáveis sensíveis (Secret)
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: enneagram-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: enneagram-secret
                  key: POSTGRES_PASSWORD
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: enneagram-secret
                  key: ADMIN_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: enneagram-secret
                  key: JWT_SECRET

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
