apiVersion: v1
kind: Secret
metadata:
  name: enneagram-secret
  namespace: enneagram
type: Opaque

# stringData: o Kubernetes converte para base64 automaticamente.
# Substitua os valores abaixo antes de aplicar.
#
# Para gerar um JWT_SECRET seguro:
#   node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"

stringData:
  POSTGRES_USER:     "enneagram_user"
  POSTGRES_PASSWORD: "TROQUE_PELA_SENHA_DO_BANCO"
  ADMIN_PASSWORD:    "TROQUE_PELA_SENHA_DO_DASHBOARD"
  JWT_SECRET:        "TROQUE_POR_STRING_ALEATORIA_LONGA"
