apiVersion: v1
kind: ConfigMap
metadata:
  name: enneagram-config
  namespace: enneagram
data:
  # Aponte para o host do seu Postgres no servidor Dublin
  # Pode ser um Service K8s, IP interno ou hostname
  POSTGRES_HOST: "postgres.seu-servidor-dublin.internal"
  POSTGRES_PORT: "5432"
  POSTGRES_DB:   "enneagram"
  NODE_ENV:      "production"
