apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enneagram-app
  namespace: argocd        # namespace onde o Argo CD está instalado
spec:
  project: default

  source:
    repoURL: https://github.com/3035tech/enneagram-app   # ajuste para seu repo
    targetRevision: main
    path: k8s                                             # pasta com os manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: enneagram

  syncPolicy:
    automated:
      prune: true       # remove recursos que não estão mais no repo
      selfHeal: true    # corrige desvios manuais automaticamente
    syncOptions:
      - CreateNamespace=true   # cria o namespace se não existir
