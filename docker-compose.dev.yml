version: '3.9'

# Uso: docker compose -f docker-compose.dev.yml up
# Monta o código local e usa next dev com hot reload

services:
  postgres:
    image: postgres:16-alpine
    container_name: enneagram_postgres_dev
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: node:20-alpine
    container_name: enneagram_app_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"

volumes:
  postgres_data_dev:
